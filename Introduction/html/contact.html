    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="introduction.html">Mario Bros Infinite</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav list me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/main.html">Game</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="">Changelog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
            </ul>
            <span class="navbar-text">
      Created By <a class="links" href="https://github.com/Xmausix">Xmausix</a>
      </span>
        </div>
    </div>
</nav>

<!-- CONTACT SECTION -->
<section class="contact-section">
    <div class="container">
        <div class="row g-4">

            <!-- FORMULARZ -->
            <div class="col-md-7  main align-center">
                <div class="contact-card">
                    <h3 class="mb-4">Skontaktuj się z nami</h3>

                    <form>
                        <div class="mb-3">
                            <label class="form-label">Imię i nazwisko</label>
                            <input type="text" class="form-control" placeholder="Twoje imię">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="email@example.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Wiadomość</label>
                            <textarea class="form-control" rows="5" placeholder="Napisz wiadomość..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-custom">Wyślij</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
    © 2026 Mario Bross Infinity | Xmausix
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
